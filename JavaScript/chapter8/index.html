
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f4f9; }
        .box-container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .result-item { 
            background: #e7f3ff; 
            border-left: 5px solid #2980b9; 
            padding: 12px; 
            margin: 15px 0; 
            font-family: 'Consolas', monospace;
        }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px; }
        h3 { color: #2980b9; margin-top: 20px; }
    
        .swap-card { background: #fff8e1; border-left: 5px solid #ffa000; }
    </style>
</head>
<body>

    <div class="box-container" id="output-view">
        <h2>Chapter 8: Class & Constructor Visualizer</h2>
    </div>

    <script>
        const outputView = document.getElementById('output-view');

    
        function displayResult(title, details, isSwap = false) {
            const section = document.createElement('div');
            const cardClass = isSwap ? "result-item swap-card" : "result-item";
            section.innerHTML = `<h3>${title}</h3><div class="${cardClass}">${details}</div>`;
            outputView.appendChild(section);
        }

      
        class HumanProfile {
            constructor(fName, lName, dob) {
                this.fName = fName;
                this.lName = lName;
                this.dob = dob;
            }
        }

        const member1 = new HumanProfile('Sumaiya', 'Akter');
        displayResult("8.1 Basic Class", `Full Name: ${member1.fName} ${member1.lName}`);

        const member2 = new HumanProfile('Sumaiya', 'Akter', new Date(2000, 9, 19));
        displayResult("8.1 Class with DOB", `Name: ${member2.fName} ${member2.lName} <br> Birth Date: ${member2.dob}`);


       
        class GlobalCitizen {
            constructor(givenName, familyName, birthDate, homeCountry) {
                this.givenName = givenName;
                this.familyName = familyName;
                this.birthDate = birthDate;
                this.homeCountry = homeCountry;
            }
        }

        const citizenInfo = new GlobalCitizen('Sumaiya', 'Akter', new Date(2000, 9, 19), 'Australia');
        displayResult("Adding Property", `Citizen: ${citizenInfo.givenName} ${citizenInfo.familyName} <br> Country: ${citizenInfo.homeCountry}`);


       
        function Learner(firstName, lastName) {
            this.firstName = firstName;
            this.lastName = lastName;
            this.toggleNames = function() {
                [this.firstName, this.lastName] = [this.lastName, this.firstName];
            };
        }

        const newLearner = new Learner('Sumaiya', 'Akter');
        let initialLabel = `Initial: ${newLearner.firstName} ${newLearner.lastName}`;
        newLearner.toggleNames(); 
        let swappedLabel = `After Swap: ${newLearner.firstName} ${newLearner.lastName}`;
        displayResult("Constructor Pattern (Name Swapping)", `${initialLabel} <br> ${swappedLabel}`);


      
        class IndividualProfile {
            constructor(givenName, surName, dob) {
                this.givenName = givenName;
                this.surName = surName;
                this.dob = dob;
            }
            exchangeNames() {
                [this.givenName, this.surName] = [this.surName, this.givenName];
            }
        }

      
        const profileA = new IndividualProfile('Sumaiya', 'Akter');
        displayResult("Individual Profile (Before Swap)", `${profileA.givenName} ${profileA.surName}`, true);

     
        const profileB = new IndividualProfile('Sumaiya', 'Akter', new Date(2000, 9, 19));
        profileB.exchangeNames(); 
        
        displayResult("Individual Profile (After Swap)", 
            `Name: ${profileB.givenName} ${profileB.surName} <br> Date of Birth: ${profileB.dob}`, 
            true
        );

    </script>
</body>
</html>
