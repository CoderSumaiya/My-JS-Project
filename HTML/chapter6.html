<!DOCTYPE html>
<html>
<head>
    <title>Modern Audio Player</title>
    <style>
    
        body { 
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0f172a; 
        }

        .audio-card { 
            background: #1e293b;
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            width: 400px;
            border: 1px solid #334155;
        }

        h2 { color: #38bdf8; font-size: 20px; margin-bottom: 25px; }

        audio { width: 100%; margin-bottom: 20px; border-radius: 50px; }

        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #7dd3fc; }

   
        #status-message {
            margin-top: 20px;
            color: #4ade80;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="audio-card">
        <h2 id="title">Data Insights Audio</h2>
        
        <audio controls id="player">
            <source src="glass-shattering-461637.mp3" type="audio/mpeg">
        </audio>

        <br>
        <button onclick="changeAudio()">Change Recording</button>
        
        <div id="status-message"></div>
    </div>

    <script>
      function changeAudio() {
        let player = document.getElementById("player");
        let title = document.getElementById("title");
        let status = document.getElementById("status-message");
        
        let newFile = "chinese-lunar-new-year-465871.mp3";
        
        player.src = newFile;
        title.innerText = "New Recording Loaded";
        
      
        status.innerText = "Success: File changed to " + newFile;
        
        player.play();
      }
    </script>

</body>
</html>
