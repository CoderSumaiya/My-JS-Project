<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated CSS Transition</title>
    <style>
   
        :root {
            --primary-bg: #f0f4f8;
            --box-color: #ff4757;
            --hover-color: #2f3542;
            --box-size: 100px;
            --expanded-size: 300px;
            --fast-speed: 2s;
            --slow-speed: 5s;
        }

        body {
            font-family: sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding: 50px;
        }

        .container { text-align: center; }

        .box {
            width: var(--box-size);
            height: var(--box-size);
            background: var(--box-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
            overflow: hidden;
            padding: 10px;
        }

        /* --- 1: Skew Transform --- */
        .box-1 {
            transition: width var(--slow-speed), height 4s, transform var(--fast-speed);
        }
        .box-1:hover {
            width: var(--expanded-size);
            height: var(--expanded-size);
            transform: skewX(20deg); 
            background: var(--hover-color);
        }

        /* --- 2 : Linear Timing with Delay --- */
        .box-2 {
          
            transition: width 2s linear 1s;
        }
        .box-2:hover {
            width: var(--expanded-size);
            background: #2ed573; 
        }

        /* --- 3: Delay with Multi-properties --- */
        .box-3 {
            transition: width var(--slow-speed), height 4s;
            transition-delay: 0.5s;
        }
        .box-3:hover {
            width: var(--expanded-size);
            height: var(--expanded-size);
            background: #1e90ff; 
        }
    </style>
</head>
<body>

    <h1>CSS Transition Visualization</h1>

    <div class="container">
        <h3>1. Skew & Transform Effect</h3>
        <div class="box box-1">Hover me (Skew)</div>
    </div>

    <div class="container">
        <h3>2. Linear Speed with 1s Delay</h3>
        <div class="box box-2">Hover me (Linear)</div>
    </div>

    <div class="container">
        <h3>3. Slow Expansion with Delay</h3>
        <div class="box box-3">Hover me (Multi)</div>
    </div>

</body>
</html>
