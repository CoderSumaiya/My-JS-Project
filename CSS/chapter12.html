<!DOCTYPE html>
<html>
<head>
  <title>Responsive Image Demo</title>
  <style>
    :root {
      --desktop-bg: bisque;
      --mobile-bg: rgb(196, 255, 232);
      --box-size: 400px;
    }

    body {
      background-color: var(--desktop-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      transition: background-color 0.5s ease;
    }

    .image-container {
      width: var(--box-size);
      height: var(--box-size);
      border: 2px solid black; 
      background-color: white;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      max-width: 100%;
      height: auto;
    }

  
    @media screen and (max-width: 500px) {
      body {
        background-color: var(--mobile-bg);
      }
      .image-container {
        width: 90%; 
        height: auto;
      }
    }
  </style>
</head>
<body>

  <div class="image-container">
    <img src="workplace.jpg" alt="Workplace Image">
  </div>

</body>
</html>
